# B3 — fe / solid — fcc Cu, 500 K, fix_lattice (pressure: null triggers the constrained path)
calculations:
- element: Cu
  mass: 63.546
  lattice: FCC
  lattice_constant: 3.615
  repeat: [5, 5, 5]
  mode: fe
  reference_phase: solid
  temperature: 500.0
  pressure: null
  pair_style: eam/alloy
  pair_coeff: '* * tests/Cu01.eam.alloy Cu'
  md:
    timestep: 0.001
    n_small_steps: 1000
  n_equilibration_steps: 2500
  n_switching_steps: 5000
  n_iterations: 2
  spring_constants: null
  queue:
    scheduler: local
    cores: 4
