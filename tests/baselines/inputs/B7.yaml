# B7 — ts / liquid — Cu, 1400 -> 1600 K, 0 bar (reversible-scaling, liquid reference)
calculations:
- element: Cu
  mass: 63.546
  lattice: FCC
  lattice_constant: 3.615
  repeat: [5, 5, 5]
  mode: ts
  reference_phase: liquid
  temperature: [1400.0, 1600.0]
  pressure: 0.0
  melting_cycle: true
  pair_style: eam/alloy
  pair_coeff: '* * tests/Cu01.eam.alloy Cu'
  md:
    timestep: 0.001
    n_small_steps: 1000
  n_equilibration_steps: 2500
  n_switching_steps: 5000
  n_iterations: 2
  spring_constants: null
  queue:
    scheduler: local
    cores: 4
