# B8 — tscale / solid — Cu, 400 -> 700 K, 0 bar (temperature-scaling sweep)
calculations:
- element: Cu
  mass: 63.546
  lattice: FCC
  lattice_constant: 3.615
  repeat: [5, 5, 5]
  mode: tscale
  reference_phase: solid
  temperature: [400.0, 700.0]
  pressure: 0.0
  pair_style: eam/alloy
  pair_coeff: '* * tests/Cu01.eam.alloy Cu'
  md:
    timestep: 0.001
    n_small_steps: 1000
  n_equilibration_steps: 2500
  n_switching_steps: 5000
  n_iterations: 2
  spring_constants: null
  queue:
    scheduler: local
    cores: 4
