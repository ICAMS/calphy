name: calphy-docs
channels:
  - conda-forge
dependencies:
  # Pin to 3.12: Sphinx 5.3.0 imports the stdlib `imghdr` module, which was
  # removed in Python 3.13 (PEP 594).  An unpinned `python` resolves to 3.13+
  # and breaks the docs build with "No module named 'imghdr'".
  - python=3.12
  - pytest
  - scipy
  - pyyaml
  - mendeleev
  - openmpi 
  - numpy
  - mpi4py
  - pylammpsmpi
  - pyscal3
  - matplotlib
  - tqdm
  - pydantic >=2.3.0
  - pip:
    - sphinx==5.3.0
    - sphinx_rtd_theme
    - myst_parser
    - furo
    - nbsphinx
    - sphinx_inline_tabs
    - sphinx_copybutton
    - sphinx_design
    - docutils==0.19
