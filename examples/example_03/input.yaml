calculations:
- element: Cu
  lattice: fcc
  lattice_constant: 3.61
  mass: 63.546
  equilibration_control: berendsen
  md:
    timestep: 0.001
  mode: ts
  n_equilibration_steps: 10000
  n_print_steps: 0
  n_iterations: 1
  n_switching_steps: 25000
  pair_coeff: '* * ../potentials/Cu01.eam.alloy Cu'
  pair_style: eam/alloy
  pressure: 0.0
  queue:
    commands:
    - conda activate calphy-dev
    cores: 4
    scheduler: local
  reference_phase: solid
  repeat:
  - 5
  - 5
  - 5
  temperature:
  - 1200.0
  - 2000.0
  tolerance:
    solid_fraction: 0
  transition_detector:
    enabled: true
    temperature_window: 200.0
    peak_threshold: 5.0
    min_agreement: 2
- element: Cu
  lattice: fcc
  lattice_constant: 3.61
  mass: 63.546
  md:
    barostat_damping: 0.1
    thermostat_damping: 0.1
    timestep: 0.001
  mode: ts
  n_equilibration_steps: 10000
  n_iterations: 1
  n_switching_steps: 25000
  pair_coeff: '* * ../potentials/Cu01.eam.alloy Cu'
  pair_style: eam/alloy
  pressure: 0.0
  queue:
    commands:
    - conda activate calphy-dev
    cores: 4
    scheduler: local
  reference_phase: liquid
  repeat:
  - 5
  - 5
  - 5
  temperature:
  - 1200.0
  - 1400.0
  transition_detector:
    enabled: true
    temperature_window: 100.0
    peak_threshold: 5.0
    min_agreement: 2
