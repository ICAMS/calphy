name: calphy-nolammps
channels:
  - conda-forge
dependencies:
  - python
  - cmake
  - gcc_linux-64
  - gxx_linux-64
  - gfortran_linux-64
  - pytest
  - scipy
  - pyyaml
  - mendeleev
  # openmpi provides mpirun for parallel (cores > 1) calphy runs; the build
  # tools above are for compiling your own `lmp` binary (calphy drives the
  # executable directly; a LAMMPS python library is only needed for the
  # optional library backend, pip install calphy[library]).
  - openmpi
  - numpy >=2.0.0
  - matplotlib
  - tqdm
  - pydantic >=2.3.0
  - pyscal3
