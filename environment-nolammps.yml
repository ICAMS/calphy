name: calphy-nolammps
channels:
  - conda-forge
dependencies:
  - python
  - cmake
  - gcc_linux-64
  - gxx_linux-64
  - gfortran_linux-64
  - pytest
  - scipy
  - pyyaml
  # openmpi provides mpirun for parallel (cores > 1) calphy runs; the build
  # tools above are for compiling your own `lmp` binary (calphy drives the
  # executable directly and no longer needs a LAMMPS python library).
  - openmpi
  - numpy
  - matplotlib
  - tqdm
  - pydantic >=2.3.0
  - pyscal3
